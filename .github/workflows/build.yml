name: Build Desktop Applications

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*' # Dispara a criação da release quando uma tag como v1.0 for criada
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build Windows Executable
      run: |
        cmd /c build_windows.bat
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NSZ-Converter-Windows
        path: dist/nsz-2-nsp/

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build AppImage
      run: |
        chmod +x build_appimage.sh
        ./build_appimage.sh
    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NSZ-Converter-Linux
        path: nsz-2-nsp.AppImage

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: NSZ-Converter-Windows
          path: windows-build
          
      - name: Zip Windows build
        run: |
          cd windows-build
          zip -r ../nsz-2-nsp.zip ./*
          cd ..
          
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: NSZ-Converter-Linux
          path: linux-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            nsz-2-nsp.zip
            linux-build/nsz-2-nsp.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
